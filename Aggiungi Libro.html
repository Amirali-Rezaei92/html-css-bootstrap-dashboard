    <main>
        <div class="container mt-5 pt-5">

            <h1>Nuovo Libro</h1>
            <form class="mt-4">

                <div class="row mb-3 ">
                    <div class="col">
                        <label class="form-label fw-bold fs-6">Nome Autore</label>
                        <input type="text" class="form-control" id="#" required
                            placeholder="Inserusci il nome dell'autore">
                    </div>
                    <div class="col">
                        <label class="form-label fw-bold fs-6">Cognome Autore</label>
                        <input type="text" class="form-control " id="#" required
                            placeholder="Inserusci il cognome dell'autore">
                    </div>
                </div>

                <div class="row">
                    <div class="col">
                        <div class="mb-3">
                            <label class="form-label fs-6 fw-bold">Titolo</label>
                            <input type="text" class="form-control" id="#" aria-describedby="emailHelp"
                                placeholder="Inserusci il titolo del libro">
                            <div id="emailHelp" class="form-text">Titolo versione italiana</div>
                        </div>
                    </div>
                </div>

                <div class="row">
                    <div class="col-12 col-lg-4 ">
                        <div class="mb-3">
                            <label class="form-label fs-6 fw-bold">Genere</label>
                            <select required class="form-select text-black" aria-label="Default select example">
                                <option selected="">Scegli il genere</option>
                                <option value="1">One</option>
                                <option value="2">Two</option>
                                <option value="3">Three</option>
                            </select>

                        </div>
                    </div>


                    <div class="col-12 col-lg-4">
                        <div class="mb-3">
                            <label class="form-label fs-6 fw-bold">Anno di
                                Pubblicazione</label>
                            <input required min="1900" max="2026" type="number" class="form-control" id="#"
                                placeholder="Inserusci l'anno">

                        </div>
                    </div>


                    <div class="col-12 col-lg-4">
                        <div class="mb-3">
                            <label class="form-label fs-6 fw-bold">ISBN#</label>
                            <input required type="text" class="form-control" id="#"
                                pattern="[A-Z]{6}[0-9]{2}[A-Z][0-9]{2}[A-Z][0-9]{3}[A-Z]"
                                placeholder="Inserusci il codice ISBN#">

                        </div>
                    </div>
                </div>
                <hr>

                <div class="container mt-3 ">
                    <div class="row"></div>
                    <div class="col">
                        <div class="mb-3">
                            <label class="form-label fs-6 fw-bold">Note</label>
                            <textarea class="form-control" id="exampleFormControlTextarea1" rows="3"
                                placeholder="Inserisci eventuali note sul libro"></textarea>
                        </div>

                    </div>
                    <div class="form-check ">
                        <input type="checkbox" class="form-check-input fs-6">
                        <label class="form-check-label fs-6">Disponibile anche in digitale</label>
                    </div>
                    <button type="submit" class="btn btn-primary mt-3">Aggiungi Libro</button>
                </div>

            </form>

        </div>

    </main>
